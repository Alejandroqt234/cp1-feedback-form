<!DOCTYPE html>
<html>
<head>
    <title>User Feedback Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>User Feedback Form</h1>

<form id="feedbackForm">

    <label>Name</label>
    <input type="text" id="name" data-tip="Write your name">

    <p id="nameError"></p>

    <label>Email</label>
    <input type="email" id="email" data-tip="Write your email">

    <p id="emailError"></p>

    <label>Comments</label>
    <textarea id="comments" maxlength="250" data-tip="Write your feedback"></textarea>

    <p id="charCount">0 / 250</p>
    <p id="commentError"></p>

    <button type="submit">Submit</button>

</form>

<div id="tooltip"></div>

<h2>Feedback</h2>

<div id="feedback-display"></div>

<script src="cp_1.js"></script>

</body>
</html>
